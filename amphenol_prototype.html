<title>Amphenol FSI — NPS Workflow (prototype)</title>

<style>
  :root {
    --amph-blue: #25509D;
    --amph-blue-800: #1A3D77;
    --amph-blue-700: #20448A;
    --amph-blue-100: #C9D6EB;
    --amph-blue-50: #E8EEF7;
    --amph-blue-25: #F4F7FC;
    --neutral-25: #FAFBFC;
    --neutral-50: #F7F8FA;
    --neutral-100: #F3F4F6;
    --neutral-200: #E5E7EB;
    --neutral-300: #D1D5DB;
    --neutral-400: #9CA3AF;
    --neutral-500: #6B7280;
    --neutral-600: #4B5563;
    --neutral-700: #374151;
    --neutral-800: #1F2937;
    --neutral-900: #111827;
    --success-50: #F0FDF4;
    --success-100: #DCFCE7;
    --success-700: #15803D;
    --warning-50: #FFFBEB;
    --warning-100: #FEF3C7;
    --warning-700: #B45309;
    --danger-50: #FEF2F2;
    --danger-100: #FEE2E2;
    --danger-700: #B91C1C;
    --info-50: #EFF6FF;
    --info-700: #1D4ED8;
  }
  html, body { height: 100%; }
  body {
    font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--neutral-50);
    color: var(--neutral-900);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .card { background: white; border: 1px solid var(--neutral-200); border-radius: 6px; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--neutral-200); font-weight: 600; font-size: 13px; color: var(--neutral-700); text-transform: uppercase; letter-spacing: 0.04em; display: flex; align-items: center; justify-content: space-between; }
  .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; line-height: 1.4; letter-spacing: 0.02em; white-space: nowrap; }
  .pill-blue   { background: var(--amph-blue-50); color: var(--amph-blue-800); border: 1px solid var(--amph-blue-100); }
  .pill-gray   { background: var(--neutral-100); color: var(--neutral-700); border: 1px solid var(--neutral-200); }
  .pill-green  { background: var(--success-50); color: var(--success-700); border: 1px solid var(--success-100); }
  .pill-amber  { background: var(--warning-50); color: var(--warning-700); border: 1px solid var(--warning-100); }
  .pill-red    { background: var(--danger-50); color: var(--danger-700); border: 1px solid var(--danger-100); }
  .pill-info   { background: var(--info-50); color: var(--info-700); border: 1px solid var(--amph-blue-100); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 4px; font-size: 13px; font-weight: 600; line-height: 1; transition: background-color .12s, border-color .12s; cursor: pointer; border: 1px solid transparent; white-space: nowrap; }
  .btn-primary { background: var(--amph-blue); color: white; border-color: var(--amph-blue); }
  .btn-primary:hover { background: var(--amph-blue-800); border-color: var(--amph-blue-800); }
  .btn-secondary { background: white; color: var(--amph-blue); border-color: var(--neutral-300); }
  .btn-secondary:hover { background: var(--amph-blue-25); border-color: var(--amph-blue); }
  .btn-tertiary { background: transparent; color: var(--neutral-700); border-color: transparent; }
  .btn-tertiary:hover { background: var(--neutral-100); }
  .btn-danger { background: white; color: var(--danger-700); border-color: var(--neutral-300); }
  .btn-danger:hover { background: var(--danger-50); border-color: var(--danger-700); }
  .btn-warning { background: white; color: var(--warning-700); border-color: var(--neutral-300); }
  .btn-warning:hover { background: var(--warning-50); border-color: var(--warning-700); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 4px; color: var(--neutral-700); font-size: 14px; font-weight: 500; }
  .nav-item:hover { background: var(--neutral-100); cursor: pointer; }
  .nav-item.active { background: var(--amph-blue-50); color: var(--amph-blue-800); font-weight: 600; }
  .nav-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amph-blue); margin-left: auto; opacity: 0; }
  .nav-item.active .dot { opacity: 1; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--neutral-700); }
  .field label.req::after { content: ' *'; color: var(--danger-700); }
  .field-readonly { padding: 8px 12px; border: 1px solid var(--neutral-200); background: var(--neutral-50); border-radius: 4px; color: var(--neutral-800); font-size: 14px; min-height: 36px; display: flex; align-items: center; }
  .input, .select, .textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--neutral-300); background: white; border-radius: 4px; font-size: 14px; font-family: inherit; color: var(--neutral-900); }
  .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--amph-blue); box-shadow: 0 0 0 3px var(--amph-blue-50); }
  .checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; font-size: 14px; }
  .checkbox input { width: 16px; height: 16px; accent-color: var(--amph-blue); cursor: pointer; }
  .table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; }
  .table th { text-align: left; font-weight: 600; font-size: 12px; color: var(--neutral-700); padding: 10px 12px; background: var(--neutral-50); border-bottom: 1px solid var(--neutral-200); text-transform: uppercase; letter-spacing: 0.04em; }
  .table td { padding: 12px; border-bottom: 1px solid var(--neutral-100); vertical-align: middle; }
  .table tr.row-clickable:hover td { background: var(--amph-blue-25); cursor: pointer; }
  .table tr.row-clickable:last-child td { border-bottom: none; }
  /* Stepper */
  .step { display: flex; gap: 12px; padding: 4px 0 12px 0; position: relative; }
  .step:last-child { padding-bottom: 0; }
  .step-rail { position: relative; width: 24px; flex-shrink: 0; }
  .step-circle { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--neutral-300); background: white; font-size: 11px; font-weight: 700; color: var(--neutral-500); position: relative; z-index: 1; }
  .step-circle.complete { background: var(--amph-blue); border-color: var(--amph-blue); color: white; }
  .step-circle.current { border-color: var(--amph-blue); color: var(--amph-blue); background: white; }
  .step-circle.current::after { content: ''; position: absolute; inset: 3px; border-radius: 50%; background: var(--amph-blue); }
  .step:not(:last-child) .step-rail::after { content: ''; position: absolute; left: 11px; top: 24px; height: calc(100% + 12px); width: 2px; background: var(--neutral-200); z-index: 0; }
  .step.complete:not(:last-child) .step-rail::after { background: var(--amph-blue); }
  .step-body { flex: 1; padding-bottom: 4px; min-width: 0; }
  .step-name { font-size: 13px; font-weight: 600; color: var(--neutral-700); }
  .step.complete .step-name, .step.current .step-name { color: var(--neutral-900); }
  .step-meta { font-size: 11px; color: var(--neutral-500); margin-top: 2px; }
  /* Notes */
  .note { background: var(--neutral-50); border: 1px solid var(--neutral-200); border-radius: 6px; padding: 10px 12px; }
  .note + .note { margin-top: 8px; }
  .note-meta { font-size: 11px; color: var(--neutral-500); display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
  .note-author { font-weight: 600; color: var(--neutral-700); }
  /* Top bar */
  .topbar { background: white; border-bottom: 1px solid var(--neutral-200); height: 56px; }
  .brand { font-weight: 700; color: var(--amph-blue-800); font-size: 16px; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }
  .brand-mark { width: 28px; height: 28px; background: var(--amph-blue); color: white; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
  .badge-count { background: var(--amph-blue); color: white; border-radius: 999px; padding: 0 6px; font-size: 11px; font-weight: 700; min-width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; }
  /* Sidebar */
  .sidebar { background: white; border-right: 1px solid var(--neutral-200); width: 220px; flex-shrink: 0; padding: 16px 12px; }
  .sidebar h6 { font-size: 11px; font-weight: 700; color: var(--neutral-500); text-transform: uppercase; letter-spacing: 0.06em; padding: 8px 12px 4px; }
  /* Modals */
  .backdrop { position: fixed; inset: 0; background: rgba(17,24,39,0.40); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 24px; }
  .modal { background: white; border-radius: 8px; max-width: 520px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--neutral-200); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 16px; font-weight: 700; color: var(--neutral-900); }
  .modal-body { padding: 20px; max-height: 60vh; overflow-y: auto; }
  .modal-footer { padding: 12px 20px; border-top: 1px solid var(--neutral-200); display: flex; justify-content: flex-end; gap: 8px; }
  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--neutral-900); color: white; padding: 12px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; z-index: 100; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); animation: slideup .25s ease-out; max-width: 360px; }
  @keyframes slideup { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  /* Utility */
  .ico { width: 16px; height: 16px; flex-shrink: 0; }
  .ico-sm { width: 14px; height: 14px; flex-shrink: 0; }
  .ico-lg { width: 20px; height: 20px; flex-shrink: 0; }
  .divider { height: 1px; background: var(--neutral-200); margin: 12px 0; }
  .scroll-area { overflow-y: auto; }
  .text-muted { color: var(--neutral-500); }
  .text-strong { color: var(--neutral-900); font-weight: 600; }
  .clickable { cursor: pointer; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  .chevron { transition: transform .15s; }
  details[open] .chevron { transform: rotate(90deg); }
  .ban { padding: 12px 16px; border-radius: 6px; font-size: 13px; display: flex; gap: 10px; align-items: flex-start; }
  .ban-info { background: var(--info-50); border: 1px solid var(--amph-blue-100); color: var(--info-700); }
  .ban-warn { background: var(--warning-50); border: 1px solid var(--warning-100); color: var(--warning-700); }
  .ban-success { background: var(--success-50); border: 1px solid var(--success-100); color: var(--success-700); }
  .ban-locked { background: var(--neutral-100); border: 1px solid var(--neutral-200); color: var(--neutral-700); }
</style>

//============================================================
// HELPERS
//============================================================
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ico = (id, cls = 'ico') => `<svg class="${cls}"><use href="#${id}"/></svg>`;
const persona = () => PERSONAS.find(p => p.id === state.currentPersonaId);
const project = () => PROJECTS.find(p => p.id === state.currentProjectId);
const stageById = (id) => STAGES.find(s => s.id === id);
const stageByKey = (k) => STAGES.find(s => s.key === k);
const fmtMoney = (n) => '$' + n.toLocaleString('en-US');
const fmtDate = (d) => d || '—';
const priorityPill = (p) => {
  const map = { 'Critical': 'pill-red', 'High': 'pill-amber', 'Med': 'pill-blue', 'Low': 'pill-gray' };
  return `<span class="pill ${map[p] || 'pill-gray'}">${escapeHtml(p)}</span>`;
};
const statusPill = (s) => {
  if (!s) return '';
  const lower = s.toLowerCase();
  let cls = 'pill-gray';
  if (lower === 'closed' || lower === 'complete') cls = 'pill-green';
  else if (lower.includes('hold') || lower.includes('pause')) cls = 'pill-amber';
  else if (lower.includes('reject') || lower.includes('escalat')) cls = 'pill-red';
  else if (lower.includes('inquiry') || lower.includes('correction') || lower.includes('waiting')) cls = 'pill-amber';
  else if (lower.includes('assigned') || lower.includes('open') || lower.includes('progress') || lower.includes('approve')) cls = 'pill-blue';
  else if (lower.includes('awaiting')) cls = 'pill-gray';
  return `<span class="pill ${cls}">${escapeHtml(s)}</span>`;
};
const stagePill = (proj) => {
  if (proj.currentStage === 0) return `<span class="pill pill-gray">— Awaiting routing</span>`;
  if (proj.currentStage === 8) return `<span class="pill pill-green">${ico('i-check','ico-sm')} Closed</span>`;
  const s = stageById(proj.currentStage);
  return `<span class="pill pill-blue">S${s.id} · ${escapeHtml(s.shortName)}</span>`;
};
const routePill = (r) => {
  if (r === 'PPP') return `<span class="pill pill-green">PPP fast-path</span>`;
  if (r === 'NPS') return `<span class="pill pill-blue">NPS engineering</span>`;
  return `<span class="pill pill-gray">— Not routed</span>`;
};

const personaCanEdit = (proj) => {
  // EM can never edit stage forms — only reassign
  if (persona().isManager) return false;
  if (!proj) return false;
  const myStage = persona().stageKey;
  const cur = stageById(proj.currentStage);
  if (!cur) return false;
  // AE persona owns both S2 (Design Validation) and S4 (Design Approval)
  if (myStage === 'AE' && (cur.key === 'AE' || cur.key === 'AEA')) return true;
  return myStage === cur.key;
};

const personaRelevantProjects = () => {
  const p = persona();
  if (state.projectsFilter === 'all') return PROJECTS;
  if (p.isManager) {
    // Manager sees AE/DS/ME stages
    return PROJECTS.filter(x => [2,3,4,5].includes(x.currentStage));
  }
  if (p.stageKey === 'CS') {
    // CSR sees unrouted SO lines + items currently in CS
    return PROJECTS.filter(x => x.currentStage <= 1);
  }
  // AE persona owns both S2 (Validation) and S4 (Design Approval)
  if (p.stageKey === 'AE') {
    return PROJECTS.filter(x => x.currentStage === 2 || x.currentStage === 4);
  }
  const stageId = stageByKey(p.stageKey)?.id;
  return PROJECTS.filter(x => x.currentStage === stageId);
};

function bindShellEvents() {
  const personaBtn = document.getElementById('persona-btn');
  const personaMenu = document.getElementById('persona-menu');
  personaBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    personaMenu.classList.toggle('hidden');
  });
  document.addEventListener('click', (e) => {
    if (!personaMenu.classList.contains('hidden') && !document.getElementById('persona-switcher').contains(e.target)) {
      personaMenu.classList.add('hidden');
    }
  });
  document.querySelectorAll('.persona-option').forEach(el => {
    el.addEventListener('click', () => {
      state.currentPersonaId = el.dataset.persona;
      // Reset to grid when switching persona for cleaner demo
      state.view = 'grid';
      state.currentProjectId = null;
      state.projectsFilter = 'auto';
      renderShell();
      toast(`Switched to ${persona().name} — ${persona().role}`);
    });
  });
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => {
      const target = el.dataset.nav;
      if (target === 'grid') {
        state.view = 'grid';
        state.currentProjectId = null;
        renderShell();
      } else {
        toast(`"${el.textContent.trim()}" — out of scope for this prototype.`);
      }
    });
  });
}

function bindGridEvents() {
  document.querySelectorAll('tr.row-clickable').forEach(row => {
    row.addEventListener('click', (e) => {
      // Ignore clicks on the route button (handled separately)
      if (e.target.closest('[data-route-now]')) return;
      const id = row.dataset.project;
      state.currentProjectId = id;
      state.view = 'project';
      renderShell();
    });
  });
  document.querySelectorAll('[data-route-now]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openModal({ type: 'route', projectId: btn.dataset.routeNow });
    });
  });
  const ft = document.getElementById('filter-toggle');
  if (ft) ft.addEventListener('change', () => {
    state.projectsFilter = ft.value;
    renderMain();
  });
}

function renderProjectView() {
  const pr = project();
  if (!pr) return '';
  const p = persona();
  const isOwner = pr.owner === p.name;
  const editable = personaCanEdit(pr);
  const isPersonaStage = stageByKey(p.stageKey)?.id === pr.currentStage;

  // Banner messaging when persona doesn't match current stage
  let banner = '';
  if (!isPersonaStage && pr.currentStage > 0 && pr.currentStage < 8) {
    const cur = stageById(pr.currentStage);
    if (p.isManager) {
      banner = `<div class="ban ban-info">${ico('i-info','ico-sm')}<div><strong>Manager view.</strong> This project is currently in <strong>${escapeHtml(cur.name)}</strong> owned by <strong>${escapeHtml(pr.owner || cur.owner + ' Pool')}</strong>. You can reassign work, but stage forms are read-only.</div></div>`;
    } else {
      const myStageId = stageByKey(p.stageKey)?.id;
      if (myStageId && myStageId < pr.currentStage) {
        banner = `<div class="ban ban-locked">${ico('i-lock','ico-sm')}<div><strong>Your stage is complete and locked.</strong> The project has moved to <strong>${escapeHtml(cur.name)}</strong>. You can view your prior input below but cannot edit.</div></div>`;
      } else if (myStageId && myStageId > pr.currentStage) {
        banner = `<div class="ban ban-warn">${ico('i-clock','ico-sm')}<div><strong>Awaiting upstream completion.</strong> The project is currently in <strong>${escapeHtml(cur.name)}</strong>. Your stage will activate once the upstream work is approved.</div></div>`;
      }
    }
  }
  if (pr.currentStage === 0 && p.stageKey !== 'CS') {
    banner = `<div class="ban ban-locked">${ico('i-lock','ico-sm')}<div>This SO line has not yet been routed. Customer Service must route it before any other stage can act.</div></div>`;
  }
  if (pr.currentStage === 8) {
    banner = `<div class="ban ban-success">${ico('i-check','ico-sm')}<div><strong>Workflow closed.</strong> Closed at ${escapeHtml(pr.ppp?.closedAt || '—')}. All stage data is locked for audit.</div></div>`;
  }

  return `
    <div class="max-w-screen-2xl mx-auto">
      ${renderProjectHeader(pr)}
      ${banner ? `<div class="mb-4">${banner}</div>` : ''}
      <div class="grid gap-4" style="grid-template-columns: minmax(0, 1fr) 360px;">
        <div class="space-y-4 min-w-0">
          ${renderHeaderAttrs(pr)}
          ${renderSoLineAttrs(pr)}
          ${renderPersonaWorkspace(pr, p, editable)}
          ${renderActionsBar(pr, p, editable)}
        </div>
        <div class="space-y-4 min-w-0">
          ${renderStageStepper(pr)}
          ${renderQuickInfo(pr)}
          ${renderNotesThread(pr)}
        </div>
      </div>
    </div>
  `;
}

function renderPersonaWorkspace(pr, p, editable) {
  if (p.isManager) return renderManagerWorkspace(pr);
  if (pr.currentStage === 0) {
    if (p.stageKey === 'CS') return renderCsWorkspace(pr, editable);
    return renderEmptyWorkspace('No persona workspace yet — awaiting CS routing.');
  }
  // AE persona has two distinct workspaces: S2 Validation form vs. S4 Approval form.
  // Render based on the project's current stage so AE sees the right view.
  if (p.stageKey === 'AE') {
    const cur = stageById(pr.currentStage);
    if (cur?.key === 'AEA') return renderAeaWorkspace(pr, editable);
    return renderAeWorkspace(pr, editable);
  }
  if (p.stageKey === 'CS')  return renderCsWorkspace(pr, editable);
  if (p.stageKey === 'DS')  return renderDsWorkspace(pr, editable);
  if (p.stageKey === 'ME')  return renderMeWorkspace(pr, editable);
  if (p.stageKey === 'CM')  return renderCmWorkspace(pr, editable);
  if (p.stageKey === 'PPP') return renderPppWorkspace(pr, editable);
  return renderEmptyWorkspace();
}

function daysTillEsd(esd) {
  if (!esd) return '—';
  const d = new Date(esd + 'T00:00:00');

  const diff = Math.round((d - now) / 86400000);
  return diff + 'd';
}

function renderStageStepper(pr) {
  const visited = new Set(pr.visitHistory.map(v => v.stage));
  const fastPath = pr.route === 'PPP';
  const items = STAGES.map(s => {
    let status = 'pending';
    let detail = '';
    if (pr.currentStage === 8) {
      status = 'complete';
    } else if (s.id < pr.currentStage) {
      status = 'complete';
    } else if (s.id === pr.currentStage) {
      status = 'current';
    } else if (fastPath && s.id > 1 && s.id < 7) {
      status = 'skipped';
    }
    const visit = pr.visitHistory.find(v => v.stage === s.key);
    if (visit) {
      detail = visit.exitedAt
        ? `${visit.owner} · ${visit.outcome || '—'}`
        : `${visit.owner} · in progress`;
    } else if (status === 'skipped') {
      detail = 'Skipped (fast-path)';
    } else if (status === 'current') {
      detail = pr.owner ? `${pr.owner} · ${pr.daysInStage}d in stage` : `Pool · ${pr.daysInStage}d`;
    }
    return { stage: s, status, detail };
  });
  return `
    <div class="card">
      <div class="card-header">
        <span>${ico('i-list','ico-sm')} Stage progress</span>
        <button class="btn btn-tertiary" data-action="audit-history" style="font-size: 11px; padding: 2px 8px;">${ico('i-history','ico-sm')} Audit history</button>
      </div>
      <div class="p-4">
        ${items.map(it => `
          <div class="step ${it.status === 'complete' ? 'complete' : it.status === 'current' ? 'current' : ''}">
            <div class="step-rail">
              <div class="step-circle ${it.status === 'complete' ? 'complete' : it.status === 'current' ? 'current' : it.status === 'skipped' ? '' : ''}">
                ${it.status === 'complete' ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>` : it.stage.id}
              </div>
            </div>
            <div class="step-body">
              <div class="step-name">${escapeHtml(it.stage.shortName)}${it.status === 'skipped' ? '<span class="text-muted font-normal" style="font-size:11px;"> · skipped</span>' : ''}</div>
              <div class="step-meta">${escapeHtml(it.detail || it.stage.owner)}</div>
            </div>
          </div>
        `).join('')}
        ${pr.route === 'PPP' ? `<div class="ban ban-info mt-3" style="font-size: 12px;">${ico('i-info','ico-sm')}<div>Fast-path: this item routes CS → PPP, skipping AE / DS / ME / CM.</div></div>` : ''}
      </div>
    </div>
  `;
}

//============================================================
// ACTIONS
//============================================================
function handleAction(act) {
  const pr = project();
  if (!pr) return;
  switch (act) {
    case 'save':
      toast('Changes saved. Stage Visit remains open.');
      break;
    case 'add-note':
      document.getElementById('note-input')?.focus();
      break;
    case 'hold':
      openModal({ type: 'hold', projectId: pr.id });
      break;
    case 'escalate':
      openModal({ type: 'escalate', projectId: pr.id });
      break;
    case 'route':
      openModal({ type: 'route', projectId: pr.id });
      break;
    case 'complete':
    case 'approve':
    case 'close':
      openModal({ type: 'complete', projectId: pr.id, label: act });
      break;
    case 'reject':
      openModal({ type: 'reject', projectId: pr.id });
      break;
    case 'audit-history':
      openModal({ type: 'audit', projectId: pr.id });
      break;
    case 'open-reassign':
      openModal({ type: 'reassign', projectId: pr.id });
      break;
    default:
      toast(`Action "${act}" — not yet wired in this prototype.`);
  }
}

//============================================================
// MODALS
//============================================================
function openModal(m) {
  state.modal = m;
  renderModal();
}
function closeModal() {
  state.modal = null;
  document.getElementById('modal-root').innerHTML = '';
}

function renderModal() {
  const m = state.modal;
  if (!m) return;
  const $root = document.getElementById('modal-root');
  let html = '';
  if (m.type === 'route') html = renderRouteModal(m);
  else if (m.type === 'hold') html = renderHoldModal(m);
  else if (m.type === 'escalate') html = renderEscalateModal(m);
  else if (m.type === 'complete') html = renderCompleteModal(m);
  else if (m.type === 'reject') html = renderRejectModal(m);
  else if (m.type === 'audit') html = renderAuditModal(m);
  else if (m.type === 'reassign') html = renderReassignModal(m);
  $root.innerHTML = html;
  bindModalEvents();
}

function bindModalEvents() {
  document.querySelectorAll('[data-modal-close]').forEach(el => el.addEventListener('click', closeModal));
  document.querySelectorAll('[data-modal-confirm]').forEach(el => {
    el.addEventListener('click', () => {
      const action = el.dataset.modalConfirm;
      handleModalConfirm(action);
    });
  });
}

function handleModalConfirm(action) {
  const m = state.modal;
  const pr = PROJECTS.find(p => p.id === m.projectId);
  switch (m.type) {
    case 'route': {
      const route = document.querySelector('input[name="route-pick"]:checked')?.value;
      if (!route) { toast('Pick a route.'); return; }
      pr.route = route;
      const seq = (PROJECTS.filter(x => x.npsId).length + 10070);
      pr.npsId = (route === 'PPP' ? 'PPP-' : 'NPS-') + (17302 + Math.floor(Math.random() * 200));
      pr.currentStage = route === 'PPP' ? 7 : 1;
      pr.status = 'Open';
      pr.owner = null; pr.ownerInitials = null;
      pr.daysInStage = 0;
      pr.visitHistory.push({ stage: route === 'PPP' ? 'CS' : 'CS', enteredAt: nowStamp(), exitedAt: nowStamp(), owner: persona().name, outcome: 'Complete' });
      pr.visitHistory.push({ stage: route === 'PPP' ? 'PPP' : 'AE', enteredAt: nowStamp(), exitedAt: null, owner: null, outcome: null });
      pr.notes.push({ author: persona().name, ts: nowStamp(), text: `Routed via ${route} ${route === 'PPP' ? 'fast-path' : 'engineering path'}.` });
      closeModal();
      renderMain();
      toast(`Routed → ${route}. ${pr.npsId} created.`);
      return;
    }
    case 'hold': {
      pr.status = 'Hold';
      pr.notes.push({ author: persona().name, ts: nowStamp(), text: 'Stage placed on Hold. SLA timer continues per Anthony.' });
      closeModal();
      renderMain();
      toast('Item held. SLA does not pause.');
      return;
    }
    case 'escalate': {
      pr.status = 'Escalated';
      pr.notes.push({ author: persona().name, ts: nowStamp(), text: 'Escalated for manager attention.' });
      closeModal();
      renderMain();
      toast('Escalated. Visible on manager dashboard.');
      return;
    }
    case 'complete': {
      const next = pr.currentStage + 1;
      // Find the visit for current stage and close it
      const stageKey = stageById(pr.currentStage)?.key;
      const cur = pr.visitHistory.find(v => v.stage === stageKey && !v.exitedAt);
      if (cur) cur.exitedAt = nowStamp(), cur.outcome = m.label === 'approve' ? 'Approve' : (m.label === 'close' ? 'Close' : 'Complete');
      if (pr.currentStage === 7) {
        // Closing PPP closes the workflow
        pr.currentStage = 8;
        pr.status = 'Closed';
        pr.daysInStage = 0;
        pr.ppp = pr.ppp || {};
        pr.ppp.closedAt = nowStamp();
        pr.notes.push({ author: persona().name, ts: nowStamp(), text: 'Workflow closed. Final ESD confirmed.' });
      } else {
        pr.currentStage = next;
        pr.status = 'Open';
        pr.owner = null; pr.ownerInitials = null;
        pr.daysInStage = 0;
        const nextStage = stageById(next);
        pr.visitHistory.push({ stage: nextStage.key, enteredAt: nowStamp(), exitedAt: null, owner: null, outcome: null });
      }
      closeModal();
      renderMain();
      toast(pr.currentStage === 8 ? 'Workflow closed.' : `Advanced to ${stageById(pr.currentStage).name}.`);
      return;
    }
    case 'reject': {
      const code = document.querySelector('input[name="rc"]:checked')?.value;
      const tgt = document.getElementById('reject-target')?.value;
      if (!code) { toast('Pick a rejection code.'); return; }
      const tgtId = parseInt(tgt, 10);
      const stageKey = stageById(pr.currentStage)?.key;
      const cur = pr.visitHistory.find(v => v.stage === stageKey && !v.exitedAt);
      if (cur) { cur.exitedAt = nowStamp(); cur.outcome = `Reject (${code})`; }
      pr.currentStage = tgtId;
      pr.status = 'Open';
      pr.owner = null; pr.ownerInitials = null;
      pr.daysInStage = 0;
      const tgtStage = stageById(tgtId);
      pr.visitHistory.push({ stage: tgtStage.key, enteredAt: nowStamp(), exitedAt: null, owner: null, outcome: null });
      pr.notes.push({ author: persona().name, ts: nowStamp(), text: `Rejected with code ${code}. Returned to ${tgtStage.name}.` });
      closeModal();
      renderMain();
      toast(`Rejected → returned to ${tgtStage.name}.`);
      return;
    }
    case 'reassign': {
      const newOwner = document.getElementById('reassign-target')?.value;
      if (!newOwner) { toast('Pick a new owner.'); return; }
      const reason = document.getElementById('reassign-reason')?.value || 'Workload balance';
      const oldOwner = pr.owner || 'Pool';
      pr.owner = newOwner;
      pr.ownerInitials = newOwner.split(' ').map(s => s[0]).join('').slice(0,2).toUpperCase();
      pr.notes.push({ author: persona().name, ts: nowStamp(), text: `Reassigned from ${oldOwner} → ${newOwner}. Reason: ${reason}.` });
      closeModal();
      renderMain();
      toast(`Reassigned to ${newOwner}.`);
      return;
    }
    default:
      closeModal();
  }
}

function nowStamp() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

      <div class="space-y-1">
        ${REJECT_CODES.map((rc,i) => `
          <label class="checkbox" style="padding: 6px 8px; border: 1px solid var(--neutral-200); border-radius: 4px;">
            <input type="radio" name="rc" value="${rc.code}" ${i===1?'checked':''}/>
            <span><strong>${escapeHtml(rc.code)}</strong> — ${escapeHtml(rc.label)}</span>
          </label>
        `).join('')}
      </div>
    </div>
    <div class="field"><label class="req">Return to stage</label>
      <select class="select" id="reject-target">
        ${opts.map(s => `<option value="${s.id}">S${s.id} · ${escapeHtml(s.name)}</option>`).join('')}
      </select>
    </div>
    <div class="field mt-3"><label class="req">Closing note</label><textarea class="textarea" rows="3" required placeholder="Explain what needs correction"></textarea></div>
  `, `
    <button class="btn btn-secondary" data-modal-close>Cancel</button>
    <button class="btn btn-danger" data-modal-confirm="reject">${ico('i-x','ico-sm')} Reject and return</button>
  `);
}

function renderReassignModal(m) {
  const pr = PROJECTS.find(p => p.id === m.projectId);
  // Mock candidate list per stage
  const candidates = {
    2: ['Mike Chen','Aanya Iyer','Ben Cooper','Hannah Liu','Jamal Davis','Sven Olsen'],
    3: ['Lisa Park','Carla Diaz','Pradeep Rao','Daniel Kim','Beth Sanders'],
    5: ['Raj Patel','Kim Yoo','Marco Bianchi'],
  }[pr.currentStage] || [];
  return modalShell('Reassign — pick new owner', `
    <p class="text-sm text-muted mb-3">Reassign the active stage owner. Stage Visit and SLA timing are not interrupted; an Assignment Change event is written to audit.</p>
    <div class="field"><label class="req">Current owner</label><div class="field-readonly">${escapeHtml(pr.owner || 'Unclaimed (pool)')}</div></div>
    <div class="field mt-3"><label class="req">New owner</label>
      <select class="select" id="reassign-target">
        ${candidates.filter(c => c !== pr.owner).map(c => `<option>${escapeHtml(c)}</option>`).join('')}
      </select>
    </div>
    <div class="field mt-3"><label class="req">Reason</label>
      <select class="select" id="reassign-reason">
        <option>Workload balance</option>
        <option>Out of office</option>
        <option>Specialty match</option>
        <option>Performance / coaching</option>
        <option>Other</option>
      </select>
    </div>
  `, `
    <button class="btn btn-secondary" data-modal-close>Cancel</button>
    <button class="btn btn-primary" data-modal-confirm="reassign">${ico('i-user','ico-sm')} Confirm reassign</button>
  `);
}

function renderAuditModal(m) {
  const pr = PROJECTS.find(p => p.id === m.projectId);
  return modalShell(`Audit history — ${escapeHtml(pr.npsId || pr.soLine)}`, `
    <div class="text-sm space-y-2">
      ${pr.visitHistory.length === 0 ? '<div class="text-muted">No audit events yet.</div>' : ''}
      ${pr.visitHistory.map(v => `
        <div class="flex items-start gap-3 p-3 rounded" style="background: var(--neutral-50); border: 1px solid var(--neutral-200);">
          <span class="pill pill-blue">${escapeHtml(v.stage)}</span>
          <div class="flex-1 min-w-0">
            <div><strong>Entered:</strong> ${escapeHtml(v.enteredAt)}${v.exitedAt ? ` · <strong>Exited:</strong> ${escapeHtml(v.exitedAt)}` : ' <span class="pill pill-amber ml-1">Active</span>'}</div>
            <div class="text-muted">Owner: ${escapeHtml(v.owner || 'Pool')} · Outcome: ${escapeHtml(v.outcome || 'In progress')}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `, `<button class="btn btn-secondary" data-modal-close>Close</button>`);
}

//============================================================
// TOAST
//============================================================
function toast(msg) {
  const $r = document.getElementById('toast-root');
  $r.innerHTML = `<div class="toast">${escapeHtml(msg)}</div>`;
  setTimeout(() => { $r.innerHTML = ''; }, 2400);
}

//============================================================
// INIT
//============================================================
renderShell();
</script>
</body>
</html>
