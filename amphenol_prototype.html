<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Amphenol FSI — NPS Workflow (prototype)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --amph-blue: #25509D;
    --amph-blue-800: #1A3D77;
    --amph-blue-700: #20448A;
    --amph-blue-100: #C9D6EB;
    --amph-blue-50: #E8EEF7;
    --amph-blue-25: #F4F7FC;
    --neutral-25: #FAFBFC;
    --neutral-50: #F7F8FA;
    --neutral-100: #F3F4F6;
    --neutral-200: #E5E7EB;
    --neutral-300: #D1D5DB;
    --neutral-400: #9CA3AF;
    --neutral-500: #6B7280;
    --neutral-600: #4B5563;
    --neutral-700: #374151;
    --neutral-800: #1F2937;
    --neutral-900: #111827;
    --success-50: #F0FDF4;
    --success-100: #DCFCE7;
    --success-700: #15803D;
    --warning-50: #FFFBEB;
    --warning-100: #FEF3C7;
    --warning-700: #B45309;
    --danger-50: #FEF2F2;
    --danger-100: #FEE2E2;
    --danger-700: #B91C1C;
    --info-50: #EFF6FF;
    --info-700: #1D4ED8;

    /* Mendix Atlas aliases — mapped to Amphenol brand so OOTB Mendix CSS lands cleanly */
    --brand-primary:        var(--amph-blue);
    --brand-primary-hover:  var(--amph-blue-800);
    --brand-success:        var(--success-700);
    --brand-warning:        var(--warning-700);
    --brand-danger:         var(--danger-700);

    --btn-border-width:           1px;
    --btn-border-radius:          4px;
    --btn-padding-y:              7px;
    --btn-padding-x:              14px;
    --btn-primary-bg:             var(--amph-blue);
    --btn-primary-bg-hover:       var(--amph-blue-800);
    --btn-primary-color:          #ffffff;
    --btn-secondary-bg:           #ffffff;
    --btn-secondary-bg-hover:     var(--amph-blue-25);
    --btn-secondary-color:        var(--amph-blue);
    --btn-secondary-border-color: var(--neutral-300);

    --form-input-bg:           #ffffff;
    --form-input-bg-hover:     var(--amph-blue-25);
    --form-input-bg-disabled:  var(--neutral-100);
    --form-input-border-color: var(--neutral-300);
    --form-input-focus-color:  var(--amph-blue);
    --form-input-focus-ring:   var(--amph-blue-50);
    --form-input-padding-y:    8px;
    --form-input-padding-x:    12px;
    --form-input-border-radius: 4px;

    --grid-bg-header:    var(--neutral-50);
    --grid-bg-hover:     var(--amph-blue-25);
    --grid-bg-selected:  var(--amph-blue-50);
    --grid-border:       var(--neutral-200);
    --grid-border-row:   var(--neutral-100);

    --spacing-xs: 4px;
    --spacing-sm: 8px;
    --spacing-md: 16px;
    --spacing-lg: 24px;
  }
  html, body { height: 100%; }
  body {
    font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--neutral-50);
    color: var(--neutral-900);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .card { background: white; border: 1px solid var(--neutral-200); border-radius: 6px; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--neutral-200); font-weight: 600; font-size: 13px; color: var(--neutral-700); text-transform: uppercase; letter-spacing: 0.04em; display: flex; align-items: center; justify-content: space-between; }
  .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; line-height: 1.4; letter-spacing: 0.02em; white-space: nowrap; }
  .pill-blue   { background: var(--amph-blue-50); color: var(--amph-blue-800); border: 1px solid var(--amph-blue-100); }
  .pill-gray   { background: var(--neutral-100); color: var(--neutral-700); border: 1px solid var(--neutral-200); }
  .pill-green  { background: var(--success-50); color: var(--success-700); border: 1px solid var(--success-100); }
  .pill-amber  { background: var(--warning-50); color: var(--warning-700); border: 1px solid var(--warning-100); }
  .pill-red    { background: var(--danger-50); color: var(--danger-700); border: 1px solid var(--danger-100); }
  .pill-info   { background: var(--info-50); color: var(--info-700); border: 1px solid var(--amph-blue-100); }
  /* Mendix Atlas — buttons (.btn / .mx-button) */
  .btn, .mx-button { display: inline-flex; align-items: center; gap: 6px; padding: var(--btn-padding-y) var(--btn-padding-x); border-radius: var(--btn-border-radius); font-size: 13px; font-weight: 600; line-height: 1; transition: background-color .12s, border-color .12s; cursor: pointer; border: var(--btn-border-width) solid transparent; white-space: nowrap; font-family: inherit; }
  .btn-primary { background: var(--btn-primary-bg); color: var(--btn-primary-color); border-color: var(--btn-primary-bg); }
  .btn-primary:hover { background: var(--btn-primary-bg-hover); border-color: var(--btn-primary-bg-hover); }
  .btn-secondary, .btn-default { background: var(--btn-secondary-bg); color: var(--btn-secondary-color); border-color: var(--btn-secondary-border-color); }
  .btn-secondary:hover, .btn-default:hover { background: var(--btn-secondary-bg-hover); border-color: var(--brand-primary); }
  .btn-tertiary, .btn-text-only { background: transparent; color: var(--neutral-700); border-color: transparent; }
  .btn-tertiary:hover, .btn-text-only:hover { background: var(--neutral-100); }
  .btn-danger { background: white; color: var(--danger-700); border-color: var(--neutral-300); }
  .btn-danger:hover { background: var(--danger-50); border-color: var(--danger-700); }
  .btn-warning { background: white; color: var(--warning-700); border-color: var(--neutral-300); }
  .btn-warning:hover { background: var(--warning-50); border-color: var(--warning-700); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-lg { padding: 10px 18px; font-size: 14px; }
  .btn:disabled, .btn[disabled], .mx-button:disabled, .mx-button[disabled] { opacity: .5; cursor: not-allowed; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 4px; color: var(--neutral-700); font-size: 14px; font-weight: 500; }
  .nav-item:hover { background: var(--neutral-100); cursor: pointer; }
  .nav-item.active { background: var(--amph-blue-50); color: var(--amph-blue-800); font-weight: 600; }
  .nav-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amph-blue); margin-left: auto; opacity: 0; }
  .nav-item.active .dot { opacity: 1; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--neutral-700); }
  .field label.req::after { content: ' *'; color: var(--danger-700); }
  .field-readonly { padding: 8px 12px; border: 1px solid var(--neutral-200); background: var(--neutral-50); border-radius: 4px; color: var(--neutral-800); font-size: 14px; min-height: 36px; display: flex; align-items: center; }
  /* Mendix Atlas — form inputs (.form-control / .input / .select / .textarea) */
  .form-control, .input, .select, .textarea { width: 100%; padding: var(--form-input-padding-y) var(--form-input-padding-x); border: 1px solid var(--form-input-border-color); background: var(--form-input-bg); border-radius: var(--form-input-border-radius); font-size: 14px; font-family: inherit; color: var(--neutral-900); }
  .form-control:hover, .input:hover, .select:hover, .textarea:hover { background: var(--form-input-bg-hover); }
  .form-control:focus, .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--form-input-focus-color); box-shadow: 0 0 0 3px var(--form-input-focus-ring); background: var(--form-input-bg); }
  .form-control[disabled], .form-control[readonly] { opacity: .6; background: var(--form-input-bg-disabled); }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group .control-label { font-size: 12px; font-weight: 600; color: var(--neutral-700); }
  /* Mendix Atlas — checkbox (.mx-checkbox / .checkbox) */
  .mx-checkbox, .checkbox { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; font-size: 14px; }
  .mx-checkbox input[type="checkbox"], .checkbox input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--brand-primary); cursor: pointer; margin: 0; }
  .mx-checkbox input[type="checkbox"]:disabled, .checkbox input[type="checkbox"]:disabled { cursor: not-allowed; opacity: .4; }
  /* Mendix Atlas — datagrid (.mx-datagrid / .table) */
  .table, .mx-datagrid-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; }
  .mx-datagrid table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; }
  .table th, .mx-datagrid table th, .mx-datagrid-table th { text-align: left; font-weight: 600; font-size: 12px; color: var(--neutral-700); padding: 10px 12px; background: var(--grid-bg-header); border-bottom: 1px solid var(--grid-border); text-transform: uppercase; letter-spacing: 0.04em; }
  .table td, .mx-datagrid table td, .mx-datagrid-table td { padding: 12px; border-bottom: 1px solid var(--grid-border-row); vertical-align: middle; }
  .table tr.row-clickable:hover td, .mx-datagrid tbody tr.row-clickable:hover td { background: var(--grid-bg-hover); cursor: pointer; }
  .table tr.row-clickable:last-child td, .mx-datagrid tbody tr.row-clickable:last-child td { border-bottom: none; }
  .mx-datagrid tbody tr.selected td, .mx-datagrid tbody tr.selected:hover td { background: var(--grid-bg-selected); }
  .mx-datagrid .col-select { width: 40px; padding: 10px 8px 10px 16px; }
  .mx-datagrid .col-select input[type="checkbox"] { vertical-align: middle; }
  /* SO line nav — left rail inside the detail page */
  .so-line-nav { background: white; border: 1px solid var(--neutral-200); border-radius: 6px; position: sticky; top: 12px; max-height: calc(100vh - 80px); overflow-y: auto; }
  .so-line-nav-header { padding: 12px 14px; border-bottom: 1px solid var(--neutral-200); }
  .so-line-nav-header .eyebrow { font-size: 10px; font-weight: 700; color: var(--neutral-500); text-transform: uppercase; letter-spacing: 0.08em; }
  .so-line-nav-header .so-id { font-size: 15px; font-weight: 700; color: var(--neutral-900); margin-top: 4px; }
  .so-line-nav-header .so-customer { font-size: 12px; color: var(--neutral-500); margin-top: 2px; }
  .so-line-nav-section { padding: 10px 14px 4px; font-size: 10px; font-weight: 700; color: var(--neutral-500); text-transform: uppercase; letter-spacing: 0.06em; }
  .so-line-nav-list { padding: 0 6px 8px; display: flex; flex-direction: column; gap: 2px; }
  .so-line-nav-item { display: flex; flex-direction: column; gap: 3px; padding: 8px 10px; border-radius: 4px; cursor: pointer; border-left: 3px solid transparent; user-select: none; }
  .so-line-nav-item:hover { background: var(--neutral-50); }
  .so-line-nav-item.active { background: var(--amph-blue-25); border-left-color: var(--amph-blue); }
  .so-line-nav-item .so-line-id { font-size: 13px; font-weight: 600; color: var(--neutral-900); display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .so-line-nav-item.active .so-line-id { color: var(--amph-blue-800); }
  .so-line-nav-item .so-line-meta { font-size: 11px; color: var(--neutral-500); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .so-line-nav-item.parent { padding: 10px; }
  .so-line-nav-item.parent .so-line-id { font-size: 14px; font-weight: 700; }
  /* Bulk action bar — sits above the datagrid for batch operations */
  .bulk-actions-bar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--amph-blue-25); border-bottom: 1px solid var(--grid-border); font-size: 13px; }
  .bulk-actions-bar.is-active { background: var(--amph-blue-50); }
  .bulk-actions-bar .selection-count { font-weight: 700; color: var(--amph-blue-800); }
  .bulk-actions-bar .selection-hint { color: var(--neutral-500); font-style: italic; }
  .bulk-actions-bar .spacer { flex: 1; }
  /* Stepper */
  .step { display: flex; gap: 12px; padding: 4px 0 12px 0; position: relative; }
  .step:last-child { padding-bottom: 0; }
  .step-rail { position: relative; width: 24px; flex-shrink: 0; }
  .step-circle { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--neutral-300); background: white; font-size: 11px; font-weight: 700; color: var(--neutral-500); position: relative; z-index: 1; }
  .step-circle.complete { background: var(--amph-blue); border-color: var(--amph-blue); color: white; }
  .step-circle.current { border-color: var(--amph-blue); color: var(--amph-blue); background: white; }
  .step-circle.current::after { content: ''; position: absolute; inset: 3px; border-radius: 50%; background: var(--amph-blue); }
  .step:not(:last-child) .step-rail::after { content: ''; position: absolute; left: 11px; top: 24px; height: calc(100% + 12px); width: 2px; background: var(--neutral-200); z-index: 0; }
  .step.complete:not(:last-child) .step-rail::after { background: var(--amph-blue); }
  .step-body { flex: 1; padding-bottom: 4px; min-width: 0; }
  .step-name { font-size: 13px; font-weight: 600; color: var(--neutral-700); }
  .step.complete .step-name, .step.current .step-name { color: var(--neutral-900); }
  .step-meta { font-size: 11px; color: var(--neutral-500); margin-top: 2px; }
  /* Notes */
  .note { background: var(--neutral-50); border: 1px solid var(--neutral-200); border-radius: 6px; padding: 10px 12px; }
  .note + .note { margin-top: 8px; }
  .note-meta { font-size: 11px; color: var(--neutral-500); display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
  .note-author { font-weight: 600; color: var(--neutral-700); }
  /* Top bar */
  .topbar { background: white; border-bottom: 1px solid var(--neutral-200); height: 56px; }
  .brand { font-weight: 700; color: var(--amph-blue-800); font-size: 16px; letter-spacing: -0.01em; display: flex; align-items: center; gap: 12px; }
  .brand-mark { width: 28px; height: 28px; background: var(--amph-blue); color: white; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
  .brand-logo { height: 28px; width: auto; display: block; flex-shrink: 0; }
  .brand-divider { width: 1px; height: 24px; background: var(--neutral-300); }
  .badge-count { background: var(--amph-blue); color: white; border-radius: 999px; padding: 0 6px; font-size: 11px; font-weight: 700; min-width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; }
  /* Sidebar */
  .sidebar { background: white; border-right: 1px solid var(--neutral-200); width: 220px; flex-shrink: 0; padding: 16px 12px; }
  .sidebar h6 { font-size: 11px; font-weight: 700; color: var(--neutral-500); text-transform: uppercase; letter-spacing: 0.06em; padding: 8px 12px 4px; }
  /* Modals */
  .backdrop { position: fixed; inset: 0; background: rgba(17,24,39,0.40); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 24px; }
  .modal { background: white; border-radius: 8px; max-width: 520px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--neutral-200); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 16px; font-weight: 700; color: var(--neutral-900); }
  .modal-body { padding: 20px; max-height: 60vh; overflow-y: auto; }
  .modal-footer { padding: 12px 20px; border-top: 1px solid var(--neutral-200); display: flex; justify-content: flex-end; gap: 8px; }
  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--neutral-900); color: white; padding: 12px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; z-index: 100; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); animation: slideup .25s ease-out; max-width: 360px; }
  @keyframes slideup { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  /* Utility */
  .ico { width: 16px; height: 16px; flex-shrink: 0; }
  .ico-sm { width: 14px; height: 14px; flex-shrink: 0; }
  .ico-lg { width: 20px; height: 20px; flex-shrink: 0; }
  .divider { height: 1px; background: var(--neutral-200); margin: 12px 0; }
  .scroll-area { overflow-y: auto; }
  .text-muted { color: var(--neutral-500); }
  .text-strong { color: var(--neutral-900); font-weight: 600; }
  .clickable { cursor: pointer; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  .chevron { transition: transform .15s; }
  details[open] .chevron { transform: rotate(90deg); }
  .ban { padding: 12px 16px; border-radius: 6px; font-size: 13px; display: flex; gap: 10px; align-items: flex-start; }
  .ban-info { background: var(--info-50); border: 1px solid var(--amph-blue-100); color: var(--info-700); }
  .ban-warn { background: var(--warning-50); border: 1px solid var(--warning-100); color: var(--warning-700); }
  .ban-success { background: var(--success-50); border: 1px solid var(--success-100); color: var(--success-700); }
  .ban-locked { background: var(--neutral-100); border: 1px solid var(--neutral-200); color: var(--neutral-700); }
</style>
</head>
<body>
<div id="app"></div>

};

    id: parentSoId,
    customer: first.customer,
    custNo: first.custNo,
    lineCount: lines.length,
    totalDollarValue: lines.reduce((sum, l) => sum + (l.dollarValue || 0), 0),

  };
};

const statusPill = (s) => {
  if (!s) return '';
  const lower = s.toLowerCase();
  let cls = 'pill-gray';
  if (lower === 'closed' || lower === 'complete') cls = 'pill-green';
  else if (lower.includes('hold') || lower.includes('pause')) cls = 'pill-amber';
  else if (lower.includes('reject') || lower.includes('escalat')) cls = 'pill-red';
  else if (lower.includes('inquiry') || lower.includes('correction') || lower.includes('waiting')) cls = 'pill-amber';
  else if (lower.includes('assigned') || lower.includes('open') || lower.includes('progress') || lower.includes('approve')) cls = 'pill-blue';
  else if (lower.includes('awaiting')) cls = 'pill-gray';
  return `<span class="pill ${cls}">${escapeHtml(s)}</span>`;
};
const stagePill = (proj) => {

};
const routePill = (r) => {

};

const personaCanEdit = (proj) => {
  // EM can never edit stage forms — only reassign
  if (persona().isManager) return false;
  if (!proj) return false;
  const myStage = persona().stageKey;

  if (!cur) return false;
  // AE persona owns both S2 (Design Validation) and S4 (Design Approval)
  if (myStage === 'AE' && (cur.key === 'AE' || cur.key === 'AEA')) return true;
  return myStage === cur.key;
};

const personaRelevantProjects = () => {
  const p = persona();
  if (state.projectsFilter === 'all') return PROJECTS;
  if (p.isManager) {
    // Manager sees AE/DS/ME stages
    return PROJECTS.filter(x => [2,3,4,5].includes(x.currentStage));
  }
  if (p.stageKey === 'CS') {
    // CSR sees unrouted SO lines + items currently in CS
    return PROJECTS.filter(x => x.currentStage <= 1);
  }
  // AE persona owns both S2 (Validation) and S4 (Design Approval)
  if (p.stageKey === 'AE') {
    return PROJECTS.filter(x => x.currentStage === 2 || x.currentStage === 4);
  }
  const stageId = stageByKey(p.stageKey)?.id;
  return PROJECTS.filter(x => x.currentStage === stageId);
};

function bindShellEvents() {
  const personaBtn = document.getElementById('persona-btn');
  const personaMenu = document.getElementById('persona-menu');
  personaBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    personaMenu.classList.toggle('hidden');
  });
  document.addEventListener('click', (e) => {
    if (!personaMenu.classList.contains('hidden') && !document.getElementById('persona-switcher').contains(e.target)) {
      personaMenu.classList.add('hidden');
    }
  });
  document.querySelectorAll('.persona-option').forEach(el => {
    el.addEventListener('click', () => {
      state.currentPersonaId = el.dataset.persona;
      // Reset to grid when switching persona for cleaner demo
      state.view = 'grid';
      state.currentProjectId = null;
      state.currentParentSoId = null;
      state.projectsFilter = 'auto';
      state.selectedLineIds.clear();
      renderShell();
      toast(`Switched to ${persona().name} — ${persona().role}`);
    });
  });
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => {
      const target = el.dataset.nav;
      if (target === 'grid') {
        state.view = 'grid';
        state.currentProjectId = null;
        renderShell();
      } else {
        toast(`"${el.textContent.trim()}" — out of scope for this prototype.`);
      }
    });
  });
}

}

      : `${projects.length} item${projects.length === 1 ? '' : 's'} in your stage. Click to open.`);

  const routableInView = projects.filter(pr => pr.currentStage === 0).map(pr => pr.id);

  for (const id of [...state.selectedLineIds]) {
    if (!routableInViewSet.has(id)) state.selectedLineIds.delete(id);
  }
  const selectedCount = state.selectedLineIds.size;

  return `
    <div class="max-w-screen-2xl mx-auto">
      <div class="flex items-start justify-between gap-4 mb-4">

              <option value="auto" ${state.projectsFilter === 'auto' ? 'selected' : ''}>${escapeHtml(p.isManager ? 'AE / DS / ME items' : (isCsr ? 'CS-relevant lines' : `${p.stageKey} items`))}</option>
              <option value="all"  ${state.projectsFilter === 'all'  ? 'selected' : ''}>All workflow items</option>
            </select>
          </div>
          ${isCsr ? '' : `<button class="btn btn-secondary" disabled>${ico('i-bar','ico-sm')} Workload view</button>`}
        </div>
      </div>

      <div class="card mx-datagrid mb-4">
        <div style="padding: 10px 12px; border-bottom: 1px solid var(--grid-border); display: flex; align-items: center; gap: 8px;">

            <span style="position:absolute; left:10px; top: 50%; transform: translateY(-50%); color: var(--neutral-400);">${ico('i-search','ico-sm')}</span>
            <input class="form-control input" id="grid-search" placeholder="Search by SO line, NPS#, customer, or part…" style="padding-left: 32px; font-size: 13px;" />
          </div>
          <span class="text-xs text-muted hidden md:inline">Filter: status</span>
          <select class="form-control select" style="width: auto; padding: 6px 28px 6px 10px; font-size: 13px;">
            <option>All statuses</option>
            <option>Awaiting routing</option>
            <option>Open / Assigned</option>
            <option>Hold / Inquiry</option>
            <option>Closed</option>
          </select>
        </div>
        ${isCsr ? renderBulkActionBar(selectedCount, routableInView.length) : ''}

          <table class="mx-datagrid-table">

                ${isCsr ? `<th class="col-select">
                  <label class="mx-checkbox" title="${routableInView.length === 0 ? 'No lines awaiting CS routing' : 'Select all routable lines'}">
                    <input type="checkbox" id="bulk-select-all"
                      ${routableInView.length === 0 ? 'disabled' : ''}
                      ${allRoutableSelected ? 'checked' : ''}
                      data-indeterminate="${someRoutableSelected ? '1' : '0'}" />
                  </label>
                </th>` : ''}
                <th>SO Line</th>
                <th>Customer</th>
                <th>Part</th>
                <th>Qty</th>
                <th>ESD</th>

function renderGridRow(pr, isCsr) {

    : `<span class="text-muted">— Pool</span>`;

            data-row-select="${pr.id}"
            ${isRoutable ? '' : 'disabled'}

      <td><span class="text-strong">${escapeHtml(pr.soLine)}</span></td>
      <td>
        <div class="text-strong">${escapeHtml(pr.customer)}</div>
        <div class="text-xs text-muted">${escapeHtml(pr.custNo)}</div>
      </td>
      <td>
        <div>${escapeHtml(pr.part)}</div>
        <div class="text-xs text-muted">${escapeHtml(pr.partDesc)}</div>
      </td>
      <td>${pr.qty}</td>
      <td>${escapeHtml(pr.esd)}</td>
      <td>${priorityPill(pr.priority)}</td>
      <td>${routePill(pr.route)}</td>
      <td><span class="text-strong">${pr.npsId ? escapeHtml(pr.npsId) : '<span class="text-muted">—</span>'}</span></td>
      <td>${stagePill(pr)}</td>
      <td>${ownerLabel}</td>
      <td>${statusPill(pr.status)}</td>
      <td>${pr.daysInStage}d</td>
      <td class="text-right">
        ${showRouteBtn
          ? `<button class="btn btn-primary btn-sm" data-route-now="${pr.id}">${ico('i-route','ico-sm')} Route…</button>`
          : `<span class="text-muted">${ico('i-chev-right','ico-sm')}</span>`}

function bindGridEvents() {
  document.querySelectorAll('tr.row-clickable').forEach(row => {
    row.addEventListener('click', (e) => {
      // Ignore clicks on the route button or selection checkbox (handled separately)
      if (e.target.closest('[data-route-now]')) return;
      if (e.target.closest('.col-select')) return;
      const id = row.dataset.project;
      const pr = PROJECTS.find(p => p.id === id);
      state.currentProjectId = id;
      state.currentParentSoId = parentSoIdOf(pr);
      state.view = 'project';
      renderShell();
    });
  });
  document.querySelectorAll('[data-route-now]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openModal({ type: 'route', projectId: btn.dataset.routeNow });
    });
  });

  // Per-row selection checkbox
  document.querySelectorAll('input[data-row-select]').forEach(cb => {
    cb.addEventListener('click', (e) => e.stopPropagation());
    cb.addEventListener('change', () => {
      const id = cb.dataset.rowSelect;
      if (cb.checked) state.selectedLineIds.add(id);
      else state.selectedLineIds.delete(id);
      renderMain();
    });
  });

  // Header "select all routable" checkbox
  const selectAll = document.getElementById('bulk-select-all');
  if (selectAll) {
    if (selectAll.dataset.indeterminate === '1') selectAll.indeterminate = true;
    selectAll.addEventListener('click', (e) => e.stopPropagation());
    selectAll.addEventListener('change', () => {
      const routableIds = personaRelevantProjects()
        .filter(pr => pr.currentStage === 0)
        .map(pr => pr.id);
      if (selectAll.checked) routableIds.forEach(id => state.selectedLineIds.add(id));
      else routableIds.forEach(id => state.selectedLineIds.delete(id));
      renderMain();
    });
  }

  // Bulk action buttons
  const bulkPpp = document.getElementById('bulk-route-ppp');
  if (bulkPpp) bulkPpp.addEventListener('click', () => {
    if (state.selectedLineIds.size === 0) return;
    openModal({ type: 'route-bulk', preselect: 'PPP' });
  });
  const bulkNps = document.getElementById('bulk-route-nps');
  if (bulkNps) bulkNps.addEventListener('click', () => {
    if (state.selectedLineIds.size === 0) return;
    openModal({ type: 'route-bulk', preselect: 'NPS' });
  });
  const bulkClear = document.getElementById('bulk-clear');
  if (bulkClear) bulkClear.addEventListener('click', () => {
    state.selectedLineIds.clear();
    renderMain();
  });

  const ft = document.getElementById('filter-toggle');
  if (ft) ft.addEventListener('change', () => {
    state.projectsFilter = ft.value;
    state.selectedLineIds.clear();
    renderMain();
  });
}

//============================================================
// RENDER: PROJECT WORKSPACE (PER-PERSONA)
//============================================================
function renderProjectView() {
  const parentSoId = state.currentParentSoId;
  if (!parentSoId) return '';
  const parent = parentSoMeta(parentSoId);
  if (!parent) return '';

  // Branch: line detail vs parent overview
  if (state.currentProjectId) return renderLineDetailView(parent);
  return renderParentOverviewView(parent);
}

function renderLineDetailView(parent) {
  const pr = project();
  if (!pr) return '';
  const p = persona();
  const editable = personaCanEdit(pr);
  const isPersonaStage = stageByKey(p.stageKey)?.id === pr.currentStage;

  // Banner messaging when persona doesn't match current stage
  let banner = '';
  if (!isPersonaStage && pr.currentStage > 0 && pr.currentStage < 8) {
    const cur = stageById(pr.currentStage);
    if (p.isManager) {
      banner = `<div class="ban ban-info">${ico('i-info','ico-sm')}<div><strong>Manager view.</strong> This project is currently in <strong>${escapeHtml(cur.name)}</strong> owned by <strong>${escapeHtml(pr.owner || cur.owner + ' Pool')}</strong>. You can reassign work, but stage forms are read-only.</div></div>`;
    } else {
      const myStageId = stageByKey(p.stageKey)?.id;
      if (myStageId && myStageId < pr.currentStage) {
        banner = `<div class="ban ban-locked">${ico('i-lock','ico-sm')}<div><strong>Your stage is complete and locked.</strong> The project has moved to <strong>${escapeHtml(cur.name)}</strong>. You can view your prior input below but cannot edit.</div></div>`;
      } else if (myStageId && myStageId > pr.currentStage) {
        banner = `<div class="ban ban-warn">${ico('i-clock','ico-sm')}<div><strong>Awaiting upstream completion.</strong> The project is currently in <strong>${escapeHtml(cur.name)}</strong>. Your stage will activate once the upstream work is approved.</div></div>`;
      }
    }
  }
  if (pr.currentStage === 0 && p.stageKey !== 'CS') {

function renderPersonaWorkspace(pr, p, editable) {
  if (p.isManager) return renderManagerWorkspace(pr);
  if (pr.currentStage === 0) {
    if (p.stageKey === 'CS') return renderCsWorkspace(pr, editable);
    return renderEmptyWorkspace('No persona workspace yet — awaiting CS routing.');
  }
  // AE persona has two distinct workspaces: S2 Validation form vs. S4 Approval form.
  // Render based on the project's current stage so AE sees the right view.
  if (p.stageKey === 'AE') {
    const cur = stageById(pr.currentStage);
    if (cur?.key === 'AEA') return renderAeaWorkspace(pr, editable);
    return renderAeWorkspace(pr, editable);
  }
  if (p.stageKey === 'CS')  return renderCsWorkspace(pr, editable);
  if (p.stageKey === 'DS')  return renderDsWorkspace(pr, editable);
  if (p.stageKey === 'ME')  return renderMeWorkspace(pr, editable);
  if (p.stageKey === 'CM')  return renderCmWorkspace(pr, editable);
  if (p.stageKey === 'PPP') return renderPppWorkspace(pr, editable);
  return renderEmptyWorkspace();
}

function daysTillEsd(esd) {
  if (!esd) return '—';
  const d = new Date(esd + 'T00:00:00');
  const now = new Date('2026-05-04T00:00:00');
  const diff = Math.round((d - now) / 86400000);
  return diff + 'd';
}

function renderStageStepper(pr) {
  const visited = new Set(pr.visitHistory.map(v => v.stage));
  const fastPath = pr.route === 'PPP';
  const items = STAGES.map(s => {
    let status = 'pending';
    let detail = '';
    if (pr.currentStage === 8) {
      status = 'complete';
    } else if (s.id < pr.currentStage) {
      status = 'complete';
    } else if (s.id === pr.currentStage) {
      status = 'current';
    } else if (fastPath && s.id > 1 && s.id < 7) {
      status = 'skipped';
    }
    const visit = pr.visitHistory.find(v => v.stage === s.key);
    if (visit) {
      detail = visit.exitedAt
        ? `${visit.owner} · ${visit.outcome || '—'}`
        : `${visit.owner} · in progress`;
    } else if (status === 'skipped') {
      detail = 'Skipped (fast-path)';
    } else if (status === 'current') {
      detail = pr.owner ? `${pr.owner} · ${pr.daysInStage}d in stage` : `Pool · ${pr.daysInStage}d`;
    }
    return { stage: s, status, detail };
  });
  return `
    <div class="card">
      <div class="card-header">
        <span>${ico('i-list','ico-sm')} Stage progress</span>
        <button class="btn btn-tertiary" data-action="audit-history" style="font-size: 11px; padding: 2px 8px;">${ico('i-history','ico-sm')} Audit history</button>
      </div>
      <div class="p-4">
        ${items.map(it => `
          <div class="step ${it.status === 'complete' ? 'complete' : it.status === 'current' ? 'current' : ''}">
            <div class="step-rail">
              <div class="step-circle ${it.status === 'complete' ? 'complete' : it.status === 'current' ? 'current' : it.status === 'skipped' ? '' : ''}">
                ${it.status === 'complete' ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>` : it.stage.id}
              </div>
            </div>
            <div class="step-body">
              <div class="step-name">${escapeHtml(it.stage.shortName)}${it.status === 'skipped' ? '<span class="text-muted font-normal" style="font-size:11px;"> · skipped</span>' : ''}</div>
              <div class="step-meta">${escapeHtml(it.detail || it.stage.owner)}</div>
            </div>
          </div>
        `).join('')}
        ${pr.route === 'PPP' ? `<div class="ban ban-info mt-3" style="font-size: 12px;">${ico('i-info','ico-sm')}<div>Fast-path: this item routes CS → PPP, skipping AE / DS / ME / CM.</div></div>` : ''}
      </div>
    </div>
  `;
}

function bindProjectEvents() {
  document.getElementById('back-to-grid')?.addEventListener('click', () => {
    state.view = 'grid';
    state.currentProjectId = null;
    state.currentParentSoId = null;
    renderShell();
  });

  // Rail / breadcrumb: jump to parent overview
  document.querySelectorAll('[data-nav-parent]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      state.currentProjectId = null;
      // currentParentSoId stays
      renderMain();
    });
  });

  // Rail / parent table: jump to specific line
  document.querySelectorAll('[data-nav-line]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const id = el.dataset.navLine;
      const target = PROJECTS.find(p => p.id === id);
      if (!target) return;
      state.currentProjectId = id;
      state.currentParentSoId = parentSoIdOf(target);
      renderMain();
    });
  });

  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => handleAction(btn.dataset.action));
  });
  const noteSend = document.getElementById('note-send');
  if (noteSend) noteSend.addEventListener('click', () => {
    const txt = document.getElementById('note-input').value.trim();
    if (!txt) return;
    const pr = project();
    pr.notes.push({ author: persona().name, ts: new Date().toISOString().slice(0,16).replace('T',' '), text: txt });
    renderMain();
    toast('Note posted (immutable).');
  });
}

//============================================================
// ACTIONS
//============================================================
function handleAction(act) {
  const pr = project();
  if (!pr) return;
  switch (act) {
    case 'save':
      toast('Changes saved. Stage Visit remains open.');
      break;
    case 'add-note':
      document.getElementById('note-input')?.focus();
      break;
    case 'hold':
      openModal({ type: 'hold', projectId: pr.id });
      break;
    case 'escalate':
      openModal({ type: 'escalate', projectId: pr.id });
      break;
    case 'route':
      openModal({ type: 'route', projectId: pr.id });
      break;
    case 'complete':
    case 'approve':
    case 'close':
      openModal({ type: 'complete', projectId: pr.id, label: act });
      break;
    case 'reject':
      openModal({ type: 'reject', projectId: pr.id });
      break;
    case 'audit-history':
      openModal({ type: 'audit', projectId: pr.id });
      break;
    case 'open-reassign':
      openModal({ type: 'reassign', projectId: pr.id });
      break;
    default:
      toast(`Action "${act}" — not yet wired in this prototype.`);
  }
}

//============================================================
// MODALS
//============================================================
function openModal(m) {
  state.modal = m;
  renderModal();
}
function closeModal() {
  state.modal = null;
  document.getElementById('modal-root').innerHTML = '';
}

function renderModal() {
  const m = state.modal;
  if (!m) return;
  const $root = document.getElementById('modal-root');
  let html = '';
  if (m.type === 'route') html = renderRouteModal(m);
  else if (m.type === 'route-bulk') html = renderRouteBulkModal(m);
  else if (m.type === 'hold') html = renderHoldModal(m);
  else if (m.type === 'escalate') html = renderEscalateModal(m);
  else if (m.type === 'complete') html = renderCompleteModal(m);
  else if (m.type === 'reject') html = renderRejectModal(m);
  else if (m.type === 'audit') html = renderAuditModal(m);
  else if (m.type === 'reassign') html = renderReassignModal(m);
  $root.innerHTML = html;
  bindModalEvents();
}

function bindModalEvents() {
  document.querySelectorAll('[data-modal-close]').forEach(el => el.addEventListener('click', closeModal));
  document.querySelectorAll('[data-modal-confirm]').forEach(el => {
    el.addEventListener('click', () => {
      const action = el.dataset.modalConfirm;
      handleModalConfirm(action);
    });
  });
}

function handleModalConfirm(action) {
  const m = state.modal;
  const pr = PROJECTS.find(p => p.id === m.projectId);
  switch (m.type) {
    case 'route': {
      const route = document.querySelector('input[name="route-pick"]:checked')?.value;
      if (!route) { toast('Pick a route.'); return; }
      pr.route = route;
      const seq = (PROJECTS.filter(x => x.npsId).length + 10070);
      pr.npsId = (route === 'PPP' ? 'PPP-' : 'NPS-') + (17302 + Math.floor(Math.random() * 200));
      pr.currentStage = route === 'PPP' ? 7 : 1;
      pr.status = 'Open';
      pr.owner = null; pr.ownerInitials = null;
      pr.daysInStage = 0;
      pr.visitHistory.push({ stage: route === 'PPP' ? 'CS' : 'CS', enteredAt: nowStamp(), exitedAt: nowStamp(), owner: persona().name, outcome: 'Complete' });
      pr.visitHistory.push({ stage: route === 'PPP' ? 'PPP' : 'AE', enteredAt: nowStamp(), exitedAt: null, owner: null, outcome: null });
      pr.notes.push({ author: persona().name, ts: nowStamp(), text: `Routed via ${route} ${route === 'PPP' ? 'fast-path' : 'engineering path'}.` });
      closeModal();
      renderMain();
      toast(`Routed → ${route}. ${pr.npsId} created.`);
      return;
    }
    case 'route-bulk': {
      const route = document.querySelector('input[name="route-pick-bulk"]:checked')?.value;
      if (!route) { toast('Pick a route.'); return; }
      const note = document.getElementById('bulk-route-note')?.value?.trim();
      const ids = [...state.selectedLineIds];
      let routedCount = 0;
      let nextSeq = 17500 + Math.floor(Math.random() * 200);
      ids.forEach(id => {
        const target = PROJECTS.find(p => p.id === id);
        if (!target || target.currentStage !== 0) return;
        target.route = route;
        target.npsId = (route === 'PPP' ? 'PPP-' : 'NPS-') + (nextSeq++);
        target.currentStage = route === 'PPP' ? 7 : 1;
        target.status = 'Open';
        target.owner = null; target.ownerInitials = null;
        target.daysInStage = 0;
        target.visitHistory.push({ stage: 'CS', enteredAt: nowStamp(), exitedAt: nowStamp(), owner: persona().name, outcome: 'Complete' });
        target.visitHistory.push({ stage: route === 'PPP' ? 'PPP' : 'AE', enteredAt: nowStamp(), exitedAt: null, owner: null, outcome: null });
        target.notes.push({ author: persona().name, ts: nowStamp(), text: `Bulk-routed via ${route} ${route === 'PPP' ? 'fast-path' : 'engineering path'}.${note ? ' Note: ' + note : ''}` });
        routedCount++;
      });
      state.selectedLineIds.clear();
      closeModal();
      renderMain();
      toast(`Routed ${routedCount} line${routedCount === 1 ? '' : 's'} → ${route}.`);
      return;
    }
    case 'hold': {
      pr.status = 'Hold';
      pr.notes.push({ author: persona().name, ts: nowStamp(), text: 'Stage placed on Hold. SLA timer continues per Anthony.' });
      closeModal();
      renderMain();
      toast('Item held. SLA does not pause.');
      return;
    }
    case 'escalate': {
      pr.status = 'Escalated';
      pr.notes.push({ author: persona().name, ts: nowStamp(), text: 'Escalated for manager attention.' });
      closeModal();
      renderMain();
      toast('Escalated. Visible on manager dashboard.');
      return;
    }
    case 'complete': {
      const next = pr.currentStage + 1;
      // Find the visit for current stage and close it
      const stageKey = stageById(pr.currentStage)?.key;
      const cur = pr.visitHistory.find(v => v.stage === stageKey && !v.exitedAt);
      if (cur) cur.exitedAt = nowStamp(), cur.outcome = m.label === 'approve' ? 'Approve' : (m.label === 'close' ? 'Close' : 'Complete');
      if (pr.currentStage === 7) {
        // Closing PPP closes the workflow
        pr.currentStage = 8;
        pr.status = 'Closed';
        pr.daysInStage = 0;
        pr.ppp = pr.ppp || {};
        pr.ppp.closedAt = nowStamp();
        pr.notes.push({ author: persona().name, ts: nowStamp(), text: 'Workflow closed. Final ESD confirmed.' });
      } else {
        pr.currentStage = next;
        pr.status = 'Open';
        pr.owner = null; pr.ownerInitials = null;
        pr.daysInStage = 0;
        const nextStage = stageById(next);
        pr.visitHistory.push({ stage: nextStage.key, enteredAt: nowStamp(), exitedAt: null, owner: null, outcome: null });
      }
      closeModal();
      renderMain();
      toast(pr.currentStage === 8 ? 'Workflow closed.' : `Advanced to ${stageById(pr.currentStage).name}.`);
      return;
    }
    case 'reject': {
      const code = document.querySelector('input[name="rc"]:checked')?.value;
      const tgt = document.getElementById('reject-target')?.value;
      if (!code) { toast('Pick a rejection code.'); return; }
      const tgtId = parseInt(tgt, 10);
      const stageKey = stageById(pr.currentStage)?.key;
      const cur = pr.visitHistory.find(v => v.stage === stageKey && !v.exitedAt);
      if (cur) { cur.exitedAt = nowStamp(); cur.outcome = `Reject (${code})`; }
      pr.currentStage = tgtId;
      pr.status = 'Open';
      pr.owner = null; pr.ownerInitials = null;
      pr.daysInStage = 0;
      const tgtStage = stageById(tgtId);
      pr.visitHistory.push({ stage: tgtStage.key, enteredAt: nowStamp(), exitedAt: null, owner: null, outcome: null });
      pr.notes.push({ author: persona().name, ts: nowStamp(), text: `Rejected with code ${code}. Returned to ${tgtStage.name}.` });
      closeModal();
      renderMain();
      toast(`Rejected → returned to ${tgtStage.name}.`);
      return;
    }
    case 'reassign': {
      const newOwner = document.getElementById('reassign-target')?.value;
      if (!newOwner) { toast('Pick a new owner.'); return; }
      const reason = document.getElementById('reassign-reason')?.value || 'Workload balance';
      const oldOwner = pr.owner || 'Pool';
      pr.owner = newOwner;
      pr.ownerInitials = newOwner.split(' ').map(s => s[0]).join('').slice(0,2).toUpperCase();
      pr.notes.push({ author: persona().name, ts: nowStamp(), text: `Reassigned from ${oldOwner} → ${newOwner}. Reason: ${reason}.` });
      closeModal();
      renderMain();
      toast(`Reassigned to ${newOwner}.`);
      return;
    }
    default:
      closeModal();
  }
}

function nowStamp() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

  const body = `
    <p class="text-sm text-muted mb-3">Route <strong class="text-strong">${lines.length} selected line${lines.length === 1 ? '' : 's'}</strong> in one shot. The same path is applied to every line; each gets its own NPS / PPP number. This action is recorded in the audit log per line.</p>
    <div class="card mb-4" style="background: var(--neutral-25); padding: 4px 12px; max-height: 180px; overflow-y: auto;">
      <ul style="list-style: none; margin: 0; padding: 0;">${linesHtml}</ul>
    </div>
    <div class="space-y-2">
      <label class="card flex items-start gap-3 p-3 clickable" style="border-width: 2px; border-color: var(--neutral-200);">
        <input type="radio" name="route-pick-bulk" value="PPP" class="mt-1" ${preselect === 'PPP' ? 'checked' : ''} />
        <div>
          <div class="font-semibold">${ico('i-route','ico-sm')} PPP fast-path <span class="pill pill-green ml-2">Recommended for already-set-up parts</span></div>
          <div class="text-sm text-muted mt-1">Skip AE / DS / ME / CM. All selected lines move directly to PPP final release.</div>
        </div>
      </label>
      <label class="card flex items-start gap-3 p-3 clickable" style="border-width: 2px; border-color: var(--neutral-200);">
        <input type="radio" name="route-pick-bulk" value="NPS" class="mt-1" ${preselect === 'NPS' ? 'checked' : ''} />
        <div>
          <div class="font-semibold">${ico('i-route','ico-sm')} NPS engineering path</div>
          <div class="text-sm text-muted mt-1">Full path: AE → DS → AE Approval → ME → CM → PPP. Required when drawings or design review are needed.</div>
        </div>
      </label>
    </div>
    <div class="form-group field mt-4">
      <label class="control-label">Closing note (optional, applied to all lines)</label>
      <textarea id="bulk-route-note" class="form-control textarea" rows="2" placeholder="Why this route? Captured in audit history."></textarea>
    </div>
  `;
  return `
    <div class="backdrop" data-modal-close-bg>
      <div class="modal" onclick="event.stopPropagation()" style="max-width: 640px;">
        <div class="modal-header">
          <h3>Route ${lines.length} selected line${lines.length === 1 ? '' : 's'}</h3>
          <button class="btn btn-tertiary" data-modal-close>${ico('i-x','ico-sm')}</button>
        </div>
        <div class="modal-body">${body}</div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-modal-close>Cancel</button>
          <button class="btn btn-primary" data-modal-confirm="route-bulk">${ico('i-arrow-right','ico-sm')} Confirm route</button>
        </div>
      </div>
    </div>
  `;
}

function renderHoldModal(m) {
  return modalShell('Hold this item', `
    <p class="text-sm text-muted mb-3">Holding the item changes its status to Hold. <strong>SLA does not pause</strong> per the current process — Anthony asked us to keep timers running.</p>
    <div class="field"><label class="req">Hold reason</label>
      <select class="select"><option>Awaiting customer</option><option>Awaiting engineering input</option><option>Awaiting material</option><option>Other</option></select>
    </div>
    <div class="field mt-3"><label>Note</label><textarea class="textarea" rows="3" placeholder="Optional details for downstream visibility"></textarea></div>
  `, `
    <button class="btn btn-secondary" data-modal-close>Cancel</button>
    <button class="btn btn-primary" data-modal-confirm="hold">Place on hold</button>
  `);
}

function renderEscalateModal(m) {
  return modalShell('Escalate to manager', `
    <p class="text-sm text-muted mb-3">Escalation flags the item for the Engineering Manager's attention. The current owner does not change.</p>
    <div class="field"><label class="req">Escalation reason</label><textarea class="textarea" rows="3" required placeholder="What's blocking? What do you need?"></textarea></div>
  `, `
    <button class="btn btn-secondary" data-modal-close>Cancel</button>
    <button class="btn btn-warning" data-modal-confirm="escalate">${ico('i-warn','ico-sm')} Escalate</button>
  `);
}

function renderCompleteModal(m) {
  const pr = PROJECTS.find(p => p.id === m.projectId);
  const cur = stageById(pr.currentStage);
  const next = pr.currentStage === 7 ? 'Workflow closes' : stageById(pr.currentStage + 1)?.name || 'Next stage';
  const verb = m.label === 'approve' ? 'Approve' : (m.label === 'close' ? 'Close workflow' : 'Mark complete');
  return modalShell(`${verb} — ${escapeHtml(cur.name)}`, `
    <p class="text-sm mb-3"><strong>You are about to ${m.label === 'close' ? 'close the workflow' : (m.label === 'approve' ? 'approve and release the item' : 'complete this stage')}.</strong></p>
    <ul class="text-sm text-muted space-y-1 mb-3" style="list-style: disc; padding-left: 18px;">
      <li>Current stage visit will close with outcome <strong>${escapeHtml(verb)}</strong>.</li>
      <li>${escapeHtml(pr.currentStage === 7 ? 'Workflow item status changes to Closed.' : `Next stage opens: ${next}.`)}</li>
      <li>Your name and timestamp are recorded as approval evidence.</li>
      <li>Stage data becomes read-only.</li>
    </ul>
    <div class="field"><label>Closing note (optional)</label><textarea class="textarea" rows="2" placeholder="Optional context for the audit log"></textarea></div>
  `, `
    <button class="btn btn-secondary" data-modal-close>Cancel</button>
    <button class="btn btn-primary" data-modal-confirm="complete">${ico('i-check','ico-sm')} Confirm ${escapeHtml(verb)}</button>
  `);
}

function renderRejectModal(m) {
  const pr = PROJECTS.find(p => p.id === m.projectId);
  // Allowed return targets are any prior stage
  const opts = STAGES.filter(s => s.id < pr.currentStage);
  return modalShell('Reject — return to a prior stage', `
    <p class="text-sm text-muted mb-3">Rejection sends the item back upstream. The current stage visit closes with outcome <strong>Reject</strong>.</p>
    <div class="field mb-3">
      <label class="req">Rejection code</label>
      <div class="space-y-1">
        ${REJECT_CODES.map((rc,i) => `
          <label class="checkbox" style="padding: 6px 8px; border: 1px solid var(--neutral-200); border-radius: 4px;">
            <input type="radio" name="rc" value="${rc.code}" ${i===1?'checked':''}/>
            <span><strong>${escapeHtml(rc.code)}</strong> — ${escapeHtml(rc.label)}</span>
          </label>
        `).join('')}
      </div>
    </div>
    <div class="field"><label class="req">Return to stage</label>
      <select class="select" id="reject-target">
        ${opts.map(s => `<option value="${s.id}">S${s.id} · ${escapeHtml(s.name)}</option>`).join('')}
      </select>
    </div>
    <div class="field mt-3"><label class="req">Closing note</label><textarea class="textarea" rows="3" required placeholder="Explain what needs correction"></textarea></div>
  `, `
    <button class="btn btn-secondary" data-modal-close>Cancel</button>
    <button class="btn btn-danger" data-modal-confirm="reject">${ico('i-x','ico-sm')} Reject and return</button>
  `);
}

function renderReassignModal(m) {
  const pr = PROJECTS.find(p => p.id === m.projectId);
  // Mock candidate list per stage
  const candidates = {
    2: ['Mike Chen','Aanya Iyer','Ben Cooper','Hannah Liu','Jamal Davis','Sven Olsen'],
    3: ['Lisa Park','Carla Diaz','Pradeep Rao','Daniel Kim','Beth Sanders'],
    5: ['Raj Patel','Kim Yoo','Marco Bianchi'],
  }[pr.currentStage] || [];
  return modalShell('Reassign — pick new owner', `
    <p class="text-sm text-muted mb-3">Reassign the active stage owner. Stage Visit and SLA timing are not interrupted; an Assignment Change event is written to audit.</p>
    <div class="field"><label class="req">Current owner</label><div class="field-readonly">${escapeHtml(pr.owner || 'Unclaimed (pool)')}</div></div>
    <div class="field mt-3"><label class="req">New owner</label>
      <select class="select" id="reassign-target">
        ${candidates.filter(c => c !== pr.owner).map(c => `<option>${escapeHtml(c)}</option>`).join('')}
      </select>
    </div>
    <div class="field mt-3"><label class="req">Reason</label>
      <select class="select" id="reassign-reason">
        <option>Workload balance</option>
        <option>Out of office</option>
        <option>Specialty match</option>
        <option>Performance / coaching</option>
        <option>Other</option>
      </select>
    </div>
  `, `
    <button class="btn btn-secondary" data-modal-close>Cancel</button>
    <button class="btn btn-primary" data-modal-confirm="reassign">${ico('i-user','ico-sm')} Confirm reassign</button>
  `);
}

function renderAuditModal(m) {
  const pr = PROJECTS.find(p => p.id === m.projectId);
  return modalShell(`Audit history — ${escapeHtml(pr.npsId || pr.soLine)}`, `
    <div class="text-sm space-y-2">
      ${pr.visitHistory.length === 0 ? '<div class="text-muted">No audit events yet.</div>' : ''}
      ${pr.visitHistory.map(v => `
        <div class="flex items-start gap-3 p-3 rounded" style="background: var(--neutral-50); border: 1px solid var(--neutral-200);">
          <span class="pill pill-blue">${escapeHtml(v.stage)}</span>
          <div class="flex-1 min-w-0">
            <div><strong>Entered:</strong> ${escapeHtml(v.enteredAt)}${v.exitedAt ? ` · <strong>Exited:</strong> ${escapeHtml(v.exitedAt)}` : ' <span class="pill pill-amber ml-1">Active</span>'}</div>
            <div class="text-muted">Owner: ${escapeHtml(v.owner || 'Pool')} · Outcome: ${escapeHtml(v.outcome || 'In progress')}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `, `<button class="btn btn-secondary" data-modal-close>Close</button>`);
}

//============================================================
// TOAST
//============================================================
function toast(msg) {
  const $r = document.getElementById('toast-root');
  $r.innerHTML = `<div class="toast">${escapeHtml(msg)}</div>`;
  setTimeout(() => { $r.innerHTML = ''; }, 2400);
}

//============================================================
// INIT
//============================================================
renderShell();
</script>
</body>
</html>
